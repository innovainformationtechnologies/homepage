<div class="block_container">
    <div class="block_body">
        <p class="text"></p>
    </div>
    <style>
        .block_image{
            width: 100%;
            height: auto;
            object-fit: cover;
            border-radius: 1rem;
        }
    </style>
    <script>
        (function(){
            function init(data){
                const element = document.getElementById(`${data.id}`)
                element.querySelector(".text").innerText = data.text
            }

            window.componentRegistry.register("block", init)
        })()
    </script>
</div>
