<div class="portfolio_container">
    <div class="portfolio_body">
        <img class="portfolio_image" src="img/logo.png" alt="portfolio image">
        <h2 class="text1">Portfolio</h2>
        <p class="text2">
            Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed sit amet nulla eget elit dictum varius. Maecenas risus mi, porta mattis nulla vitae, ultricies lorem.
        </p>
    </div>
    <style>
        .portfolio_container{
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 10vh auto;
        }
        .portfolio_body{
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .portfolio_image{
            width: 100%;
            height: 80vh;
            object-fit: cover;
            border-radius: 1rem;
        }
    </style>
    <script>
        (function(){
            function init(data){
                const element = document.getElementById(`${data.id}`)
                element.querySelector(".text1").innerHTML = data.text1
                element.querySelector(".text2").innerHTML = data.text2
                element.querySelector("img").src = data.image_url
            }

            window.componentRegistry.register("portfolio", init)
        })()
    </script>
</div>
