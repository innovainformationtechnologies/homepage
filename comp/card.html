<div class="card_container">
    <div id="card" class="card_body">
        <img class="card_image" src="static/innova_logo.png" alt="service image">
        <h1 class="text1">Service 1: Website Development</h1>
        <p class="text2">
            Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed sit amet nulla eget elit dictum varius. Maecenas risus mi, porta mattis nulla vitae, ultricies lorem.
        </p>
        <div class="cta">
            <a class="btn btn-lg btn-primary" href="mailto:info@example.com">Get in touch</a>
        </div>
    </div>
    <style>
        .card_container{
            width: 30vh;
            height: 60vh;
            background-color: var(--text);
            display: flex;
            flex-direction: column;
            justify-content: left;
            align-items: left;
            margin: 10vh auto;
            border-radius: 1rem;
        }
        
        .card_body{
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: left;
            align-items: left;
            padding: 1rem;
            & > h1{
                color: var(--background) !important;
            }
            & > p{
                color: var(--background) !important;
                opacity: 80%;
            }
        }
        .card_image{
            height: 50%;
            object-fit: cover;
            border-radius: 1rem;
        }
        .cta{
            margin: auto;
        }
    </style>
    <script>
        (function(){
            function init(data){
                console.log("card data ", data)
                const element = document.getElementById(`${data.id}`)
                element.querySelector(".text1").innerText = data.text1
                element.querySelector(".text2").innerText = data.text2
                element.querySelector(".cta").querySelector("a").href = data.cta_url
                element.querySelector(".cta").querySelector("a").innerText = data.price
                element.querySelector(".card_image").src = data.image_url
                element.style.maxWidth = "30vh"
                element.style.margin = "auto"
            }
            

            window.componentRegistry.register("card", init)
        })()
    </script>
</div>
