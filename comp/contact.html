<div>
    <div id="contact" class="container">
        <div class="contact">
            <div class="contact-inner">
                <h1 class="text1">Contact</h1>
                <p class="text2">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed sit amet nulla eget elit dictum varius. Maecenas risus mi, porta mattis nulla vitae, ultricies lorem.</p>
                <div class="cta">
                    <a href="mailto:info@example.com" class="btn btn-lg btn-primary">Get in touch</a>
                </div>
            </div>
        </div>
    </div>
    <script>
        (function(){
            function init(data){
                const contact = document.querySelector("#contact")
                contact.querySelector(".text1").textContent = data.text1
                contact.querySelector(".text2").textContent = data.text2
            }

            window.componentRegistry.register("contact", init)
        })()
    </script>
</div>
